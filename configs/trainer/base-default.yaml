# Production trainer recipe shared by tile-encoder and slide-aggregator
# training. `default_root_dir`, `checkpoint.filename`, and `logger.name` are
# auto-derived from the run_name at runtime — they do not need to be set
# here.
seed: 42
test_after_fit: true
enable_lr_monitor: true
trainer:
  accelerator: gpu
  # `auto` resolves to the GPUs visible to each task. Under the sbatch's
  # --ntasks-per-node=2 / gpu:2 that is 2, matching the SLURM-managed DDP rank
  # count (devices must equal --ntasks-per-node, else rank 1 indexes a missing
  # GPU and the job errors at startup).
  devices: auto
  strategy: ddp
  num_nodes: 1
  sync_batchnorm: true
  max_epochs: 50
  max_time: "01:09:00:00"
  precision: 16-mixed
  default_root_dir: outputs/model_training
  log_every_n_steps: 5
  fast_dev_run: false
  accumulate_grad_batches: 8
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  limit_test_batches: 1.0
  num_sanity_val_steps: 2
checkpoint:
  monitor: val/loss
  mode: min
  save_top_k: 5
  save_last: true
  every_n_epochs: 1
logger:
  save_dir: outputs/model_training/lightning_logs
